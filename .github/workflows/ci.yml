name: CI

on:
  push:
    branches: [main]
  pull_request:

# Concurrency: a new push to the same branch cancels in-flight runs of this
# workflow so PRs don't queue up redundant CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npx vitest run
      # `npm run lint` exists but currently surfaces pre-existing
      # @typescript-eslint/no-explicit-any cases in tests. Wire it up
      # once those are cleaned up.
